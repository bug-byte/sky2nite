services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: sky2nite
      POSTGRES_USER: sky2nite
      POSTGRES_PASSWORD: sky2nite
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sky2nite -d sky2nite"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      env_file:
        - path: ./server/.env
          required: false
      args:
        - VITE_GOOGLE_MAPS_API_KEY
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      # PostgreSQL — change credentials/host if using your own existing instance
      DATABASE_URL: postgresql://sky2nite:sky2nite@db:5432/sky2nite
      # ANTARES API
      ANTARES_API_BASE_URL: https://api.antares.noirlab.edu/v1
      CACHE_TTL_SECONDS: 3600
      # Optional: uncomment to restrict CORS to a specific origin
      # FRONTEND_URL: https://your-domain.com

volumes:
  pgdata:
