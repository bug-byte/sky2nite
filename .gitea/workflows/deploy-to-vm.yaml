# Gitea Actions – Deploy to development VM via Docker Compose
#
# Triggers on every push to the `development` branch, syncs the repository
# to the target VM, then rebuilds and restarts the containers.
#
# Prerequisites (set as repository Secrets in Gitea → Settings → Secrets):
#   DEPLOY_SSH_KEY – SSH private key for password-less authentication
#   DEPLOY_USER   – SSH username on the target VM (default: deploy)
#   DEPLOY_HOST   – IP or hostname of the target VM (e.g. 192.168.0.40)

name: Deploy to Development VM

on:
  push:
    branches:
      - development

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SSH key
        run: |
          mkdir -p /home/gitea/.ssh
          { echo 'Host deploy-vm'; \
            echo "  HostName ${{ secrets.DEPLOY_HOST }}"; \
            echo "  User ${{ secrets.DEPLOY_USER || 'deploy' }}"; \
            echo '  IdentityFile /home/gitea/.ssh/deploy_key'; \
            echo '  StrictHostKeyChecking accept-new'; } \
            > /home/gitea/.ssh/config
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > /home/gitea/.ssh/deploy_key
          chmod 600 /home/gitea/.ssh/deploy_key

      - name: Clone or pull repository on VM
        run: |
          REPO_SLUG="${{ github.repository }}"
          CLONE_URL="http://git.devinmajor.com/$REPO_SLUG.git"

          ssh -T deploy-vm << GITSCRIPT
            set -e

            # Ensure git is installed
            if ! command -v git &>/dev/null; then
              echo "Git not found, installing..."
              sudo apt-get update -qq && sudo apt-get install -y -qq git
            fi

            echo "Repository URL: $CLONE_URL"

            if [ -d /home/"$USER"/sky2nite/.git ]; then
              cd /home/"$USER"/sky2nite
              echo "Existing repo found — pulling latest..."
              GIT_TERMINAL_PROMPT=0 git pull "$CLONE_URL" development
            else
              echo "Fresh clone..."
              mkdir -p /home/"$USER"/sky2nite
              GIT_TERMINAL_PROMPT=0 git clone --branch development "$CLONE_URL" /home/"$USER"/sky2nite
            fi
            echo "Git operation completed."
          GITSCRIPT

      - name: Pull PostgreSQL image
        run: |
          ssh -T deploy-vm 'docker compose -f $HOME/sky2nite/docker-compose.yml pull db'

      - name: Build and restart application containers
        run: |
          ssh -T deploy-vm 'docker compose -f $HOME/sky2nite/docker-compose.yml up --build -d'

      - name: Clean up unused Docker images
        run: |
          ssh -T deploy-vm 'docker image prune -f'
