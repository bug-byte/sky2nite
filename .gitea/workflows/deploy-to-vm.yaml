# Gitea Actions – Deploy to development VM via Docker Compose
#
# Triggers on every push to the `development` branch, syncs the repository
# to the target VM, then rebuilds and restarts the containers.
#
# Prerequisites (set as repository Secrets in Gitea → Settings → Secrets):
#   DEPLOY_SSH_KEY – SSH private key for password-less authentication
#   DEPLOY_USER   – SSH username on the target VM (default: deploy)
#   DEPLOY_HOST   – IP or hostname of the target VM (e.g. 192.168.0.40)

name: Deploy to Development VM

on:
  push:
    branches:
      - development

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SSH key
        run: |
          mkdir -p /home/gitea/.ssh
          { echo 'Host deploy-vm'; \
            echo "  HostName ${{ secrets.DEPLOY_HOST }}"; \
            echo "  User ${{ secrets.DEPLOY_USER || 'deploy' }}"; \
            echo '  IdentityFile /home/gitea/.ssh/deploy_key'; \
            echo '  StrictHostKeyChecking accept-new'; } \
            > /home/gitea/.ssh/config
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > /home/gitea/.ssh/deploy_key
          chmod 600 /home/gitea/.ssh/deploy_key

      - name: Pull latest code on VM and restart containers
        run: |
          # GITHUB_REPOSITORY is set by Gitea Actions (e.g. "owner/repo")
          REPO_SLUG="${{ github.repository }}"

          ssh -T deploy-vm << DEPLOYSCRIPT
            set -e
            CLONE_URL="http://${{ secrets.DEPLOY_HOST }}:3000/$REPO_SLUG.git"

            if [ -d /home/"$USER"/sky2nite/.git ]; then
              cd /home/"$USER"/sky2nite
              git pull "$CLONE_URL" development
            else
              mkdir -p /home/"$USER"/sky2nite
              git clone --branch development "$CLONE_URL" /home/"$USER"/sky2nite
            fi

            cd /home/"$USER"/sky2nite
            echo "--- Pulling PostgreSQL image (if needed) ---"
            docker compose pull db
            echo "--- Building and starting services ---"
            docker compose up --build -d
            echo "--- Cleaning up unused images ---"
            docker image prune -f
            echo "--- Deployment complete ---"
          DEPLOYSCRIPT
